name: Release

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      id-token: write  # Required for attestation signing
      attestations: write  # Required for publishing attestations

    # Third-party / external actions are pinned to a commit SHA (not a mutable
    # major tag) because this job holds id-token + attestations write scope.
    # Dependabot's github-actions ecosystem reads the `# vX.Y.Z` trailer and
    # bumps both the SHA and the comment via a reviewed PR.
    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Set up JDK 17
      uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    # Build, test, and enforce Jacoco coverage gate. `verify` is required (not `package`)
    # because jacoco:check is bound to the verify phase.
    - name: Build with Maven
      run: mvn clean verify

    # Extract version from git tag instead of running Maven
    - name: Get version from tag
      id: get_version
      run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

    # Generate build provenance attestation
    - name: Attest build provenance
      uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
      with:
        subject-path: 'target/StormtrooperX-*.jar'

    # Upload JAR and CycloneDX SBOMs (XML + JSON) to GitHub Releases.
    # The SBOMs document the shaded dependency tree (bStats, H2, HikariCP,
    # MySQL Connector/J) so consumers can audit transitive deps without
    # unpacking the jar.
    - name: Upload release assets
      uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
      with:
        files: |
          target/StormtrooperX-*.jar
          target/bom.xml
          target/bom.json
        fail_on_unmatched_files: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    # Upload to Modrinth
    - name: Publish to Modrinth
      uses: cloudnode-pro/modrinth-publish@150bec632db186f87c686435b29c55e7543107ea # v2.5.0
      continue-on-error: true
      with:
        token: ${{ secrets.MODRINTH_TOKEN }}
        project: ${{ vars.MODRINTH_PROJECT_ID }}
        version: ${{ steps.get_version.outputs.VERSION }}
        name: StormtrooperX ${{ steps.get_version.outputs.VERSION }}
        changelog: ${{ github.event.release.body }}
        channel: release
        loaders: |-
          bukkit
          spigot
          paper
          purpur
        game-versions: |-
          1.18.x
          1.19.x
          1.20.x
          1.21.x
          26.1.x
        files: target/StormtrooperX-${{ steps.get_version.outputs.VERSION }}.jar
